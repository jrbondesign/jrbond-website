<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Private — Jonathan Bond</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="/images/UW0H2OtQl7EdKLqyhQs26GI2Y.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      *,*::before,*::after{box-sizing:border-box;}
      :root{color-scheme:dark;--bg:#ffffff;--fg:#242527;--muted:#4f4f4f;--pill-bg:#ededed;--pill-bg-hover:#e0e0e0;--border:#ededed;--img-border:#d9d9d9;}
      @media all{:root{--bg:#0f0f0f;--fg:#f5f6f7;--muted:#999999;--pill-bg:#2e2e2e;--pill-bg-hover:#3a3a3a;--border:#303030;--img-border:#303030;}}
      html{scroll-behavior:smooth;}
      body{margin:0;background:var(--bg);color:var(--fg);font-family:"Inter","Inter Placeholder",sans-serif;-webkit-font-smoothing:antialiased;}
      .nav{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:24px;padding:40px 40px 24px;background:var(--bg);}
      .nav .logo{font-family:"Manrope","Manrope Placeholder",sans-serif;font-size:24px;font-weight:500;line-height:36px;color:var(--fg);text-decoration:none;}
      .nav .links{position:absolute;left:50%;transform:translateX(-50%);display:flex;gap:48px;}
      .nav .links a{font-size:18px;line-height:27px;color:var(--fg);text-decoration:none;}
      .nav .links a:hover{text-decoration:underline;}
      .nav .contact-pill{font-size:18px;line-height:24px;color:var(--fg);text-decoration:none;background:var(--pill-bg);border-radius:32px;padding:14px 24px;}
      .nav .contact-pill:hover{background:var(--pill-bg-hover);}
      .container{max-width:1440px;margin:0 auto;padding:0 60px;}
      .hero{padding-top:220px;}
      h1{font-family:"Manrope","Manrope Placeholder",sans-serif;font-size:72px;font-weight:500;line-height:1.15;letter-spacing:-0.04em;margin:0 0 40px;max-width:1100px;}
      .subtitle{font-family:"Manrope","Manrope Placeholder",sans-serif;font-size:24px;font-weight:500;line-height:36px;color:var(--muted);margin:0 0 56px;max-width:1100px;}
      .meta{display:grid;grid-template-columns:190px 220px 200px minmax(0,1fr);gap:40px 64px;margin-bottom:72px;}
      .meta .label{font-size:16px;line-height:24px;color:var(--muted);margin:0 0 16px;}
      .meta p{font-size:18px;line-height:27px;margin:0 0 12px;}
      .shot{margin:32px 0 64px;}
      .shot img{display:block;width:100%;height:auto;border:1px solid var(--img-border);border-radius:16px;}
      section.copy{max-width:1100px;margin:0 0 48px;}
      h3{font-family:"Manrope","Manrope Placeholder",sans-serif;font-size:44px;font-weight:400;line-height:1.4;margin:48px 0 24px;}
      section.copy p{font-size:18px;line-height:27px;color:var(--muted);margin:0 0 24px;}
      section.copy strong{color:var(--fg);font-weight:600;}
      section.copy a{color:var(--fg);text-decoration:underline;}
      .footer{margin-top:96px;border-top:1px solid var(--border);padding:96px 0 48px;}
      .footer .footer-grid{display:flex;justify-content:space-between;align-items:flex-start;gap:48px;flex-wrap:wrap;}
      .footer h2{font-family:"Manrope","Manrope Placeholder",sans-serif;font-size:56px;font-weight:400;line-height:1.15;margin:0 0 40px;}
      .footer .say-hello{display:inline-block;font-size:18px;line-height:24px;color:var(--fg);text-decoration:none;background:var(--pill-bg);border-radius:32px;padding:14px 24px;}
      .footer .say-hello:hover{background:var(--pill-bg-hover);}
      .footer .social{display:flex;flex-direction:column;align-items:flex-end;gap:32px;}
      .footer .social a{font-size:18px;line-height:27px;color:var(--fg);text-decoration:none;}
      .footer .copyright{margin-top:72px;font-size:18px;line-height:27px;color:var(--fg);}
      .built-note{margin-top:16px;font-size:14px;line-height:21px;color:var(--muted);}
      /* lock screen */
      .gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
      .gate .card{width:100%;max-width:440px;text-align:center;}
      .gate .eyebrow{font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 16px;}
      .gate h1{font-size:34px;line-height:1.2;margin:0 0 14px;letter-spacing:-0.02em;}
      .gate p.lead{color:var(--muted);font-size:17px;line-height:26px;margin:0 0 28px;}
      .gate form{display:flex;flex-direction:column;gap:12px;text-align:left;}
      .gate input{font-family:"Inter",sans-serif;font-size:16px;color:var(--fg);background:var(--pill-bg);border:1px solid var(--border);border-radius:12px;padding:14px 16px;outline:none;}
      .gate input:focus{border-color:#5b9dd9;}
      .gate button{font-family:"Inter",sans-serif;font-size:16px;font-weight:600;color:var(--bg);background:var(--fg);border:0;border-radius:12px;padding:14px 16px;cursor:pointer;}
      .gate button:disabled{opacity:.6;cursor:default;}
      .gate .err{color:#e5716f;font-size:14px;min-height:20px;margin:2px 0 0;}
      /* index of gated projects */
      .idx{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px;margin:16px 0 40px;}
      .idx a{display:flex;flex-direction:column;gap:12px;padding:32px;border:1px solid var(--border);border-radius:20px;text-decoration:none;color:var(--fg);background:rgba(255,255,255,0.02);transition:border-color .15s ease,transform .15s ease;}
      .idx a:hover{border-color:#4a4a4a;transform:translateY(-2px);}
      .idx .k{font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
      .idx h3{font-family:"Manrope",sans-serif;font-size:26px;font-weight:500;line-height:1.25;margin:0;}
      .idx p{font-size:16px;line-height:24px;color:var(--muted);margin:0;}
      .idx .go{font-size:15px;color:var(--fg);margin-top:auto;}
      .backlink{display:inline-block;font-size:16px;color:var(--muted);text-decoration:none;margin:24px 0 8px;}
      .backlink:hover{color:var(--fg);text-decoration:underline;}
      .proj{padding-top:96px;}
      .proj .hero{padding-top:24px;}
      .ph-ph{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;aspect-ratio:16/9;width:100%;border:1px dashed var(--img-border);border-radius:16px;color:var(--muted);background:rgba(255,255,255,0.02);}
      .ph-ph span{font-size:14px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
      .ph-ph small{font-size:14px;max-width:60ch;text-align:center;padding:0 24px;}
      @media (max-width:809px){
        .nav{padding:20px 24px 16px;}
        .nav .links{position:static;transform:none;gap:24px;}
        .nav .contact-pill{padding:10px 18px;font-size:16px;}
        .container{padding:0 24px;}
        .hero{padding-top:140px;}
        h1{font-size:40px;}
        .subtitle{font-size:20px;line-height:30px;}
        .meta{grid-template-columns:1fr;gap:32px;}
        .nav .logo{font-size:20px;line-height:28px;white-space:nowrap;}
        h3{font-size:30px;}
        .footer h2{font-size:40px;}
        .footer .social{align-items:flex-start;}
      }
    </style>
  </head>

    <div class="gate" id="gate">
      <div class="card">
        <p class="eyebrow">Jonathan Bond</p>
        <h1>A few projects, by invitation</h1>
        <p class="lead">This set is shared privately. Enter the password to view it.</p>
        <form id="f" autocomplete="off">
          <input id="pw" type="password" placeholder="Password" aria-label="Password" autofocus />
          <button id="b" type="submit">Unlock</button>
          <p class="err" id="err" role="alert"></p>
        </form>
      </div>
    </div>

      var PROJECTS = null;
      var SKEY = "aip.k"; // per-tab session key so unlock persists without re-entering
      var gate = document.getElementById("gate"), app = document.getElementById("app"), view = document.getElementById("view");
      var f = document.getElementById("f"), pw = document.getElementById("pw"), b = document.getElementById("b"), err = document.getElementById("err");
      function b64d(s){ return Uint8Array.from(atob(s), function(c){ return c.charCodeAt(0); }); }
      async function decrypt(pass){
        var enc = new TextEncoder();
        var km = await crypto.subtle.importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"]);
        var key = await crypto.subtle.deriveKey({ name:"PBKDF2", salt:b64d(DATA.s), iterations:DATA.n, hash:"SHA-256" }, km, { name:"AES-GCM", length:256 }, false, ["decrypt"]);
        var pt = await crypto.subtle.decrypt({ name:"AES-GCM", iv:b64d(DATA.i) }, key, b64d(DATA.c));
        return new TextDecoder().decode(pt);
      }
      function esc(s){ return String(s).replace(/[&<>"]/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]; }); }
      function renderIndex(){
        var cards = PROJECTS.map(function(p,i){
          return '<a href="#/p'+i+'"><span class="k">'+esc(p.kicker)+'</span><h3>'+esc(p.title)+'</h3><p>'+esc(p.blurb)+'</p><span class="go">View project &rarr;</span></a>';
        }).join("");
        view.innerHTML = '<header class="hero"><h1>AI projects</h1><p class="subtitle">A private selection of things I have designed and built where AI is at the core of the product, the process, or both.</p></header><div class="idx">'+cards+'</div>';
        window.scrollTo(0,0);
      }
      function renderProject(i){
        var p = PROJECTS[i];
        if(!p){ location.hash = "#/"; return; }
        view.innerHTML = '<div class="proj"><a class="backlink" href="#/">&larr; All AI projects</a>' + p.body + '</div>';
        window.scrollTo(0,0);
      }
      function route(){
        if(!PROJECTS) return;
        var m = /^#\/p(\d+)$/.exec(location.hash || "");
        if(m){ renderProject(+m[1]); } else { renderIndex(); }
      }
      window.addEventListener("hashchange", route);
      function enter(){ gate.remove(); app.hidden = false; route(); }
      f.addEventListener("submit", async function(e){
        e.preventDefault(); err.textContent=""; b.disabled=true; b.textContent="Unlocking...";
        try{
          var payload = JSON.parse(await decrypt(pw.value));
          PROJECTS = payload.projects;
          try{ sessionStorage.setItem(SKEY, pw.value); }catch(_){}
          enter();
        }catch(ex){
          err.textContent="That password didn't work. Try again.";
          b.disabled=false; b.textContent="Unlock"; pw.select();
        }
      });
      // auto-unlock for the rest of the tab session (survives refresh / back button / leaving and returning)
      (async function(){
        var saved; try{ saved = sessionStorage.getItem(SKEY); }catch(_){ saved = null; }
        if(!saved) return;
        try{
          var payload = JSON.parse(await decrypt(saved));
          PROJECTS = payload.projects;
          enter();
        }catch(ex){ try{ sessionStorage.removeItem(SKEY); }catch(_){} }
      })();
